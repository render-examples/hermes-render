# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
#
# Hermes Agent on Render
# https://github.com/NousResearch/hermes-agent
#
# Single web service running the upstream Docker image. The container runs
# the gateway as the foreground process and the dashboard as a background
# side-process (HERMES_DASHBOARD=1). Render's public URL serves the
# dashboard on port 10000; persistent state lives on a 5 GB disk mounted
# at /opt/data, which is the upstream HERMES_HOME default.
#
# Pinned to a specific tag so deploys are reproducible. To update Hermes,
# bump the image tag and trigger a deploy.

services:
  - type: web
    name: hermes
    runtime: image
    region: oregon
    plan: standard
    image:
      url: docker.io/nousresearch/hermes-agent:v2026.5.7
    # On Render, `dockerCommand` replaces both the image's CMD AND its
    # ENTRYPOINT. The upstream Hermes image relies on its entrypoint to
    # drop root via gosu, bootstrap /opt/data, and start the dashboard
    # side-process when HERMES_DASHBOARD=1. We therefore replicate the
    # original ENTRYPOINT chain (tini → entrypoint.sh) and pass
    # `gateway run` as the foreground subcommand. Without `gateway run`,
    # the entrypoint falls back to the interactive `hermes` REPL, which
    # exits immediately on Render's non-TTY stdin.
    dockerCommand: /usr/bin/tini -g -- /opt/hermes/docker/entrypoint.sh gateway run
    autoDeployTrigger: off
    healthCheckPath: /api/status

    disk:
      name: hermes-data
      mountPath: /opt/data
      sizeGB: 5

    envVars:
      # Dashboard side-process. The entrypoint backgrounds `hermes dashboard`
      # before exec'ing `gateway run` whenever HERMES_DASHBOARD is truthy.
      # HERMES_DASHBOARD_HOST=0.0.0.0 makes the entrypoint pass --insecure
      # so the dashboard accepts non-loopback binds.
      - key: HERMES_DASHBOARD
        value: "1"
      - key: HERMES_DASHBOARD_HOST
        value: "0.0.0.0"
      - key: HERMES_DASHBOARD_PORT
        value: "10000"
      # Exposes a Chat tab in the dashboard that embeds the full Hermes TUI
      # over a server-side PTY + xterm.js. This is how you chat with the
      # agent without a real terminal on the host side.
      - key: HERMES_DASHBOARD_TUI
        value: "1"

      # Generated once at first deploy. Reuse this value as API_SERVER_KEY
      # if you later set API_SERVER_ENABLED=true.
      - key: HERMES_GATEWAY_TOKEN
        generateValue: true

      # OpenAI-compatible API server is OFF by default. Enable it only if
      # you want external clients (Open WebUI, LibreChat, your own code)
      # to call Hermes over HTTP. Requires API_SERVER_KEY.
      - key: API_SERVER_ENABLED
        value: "false"
      - key: API_SERVER_HOST
        value: "0.0.0.0"
      - key: API_SERVER_KEY
        sync: false
      - key: API_SERVER_CORS_ORIGINS
        sync: false

      # LLM provider keys. OpenRouter alone is enough to start; the others
      # are optional. Fill in via the Render Dashboard (Environment tab).
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false

      # Tool API keys (all optional).
      - key: BROWSERBASE_API_KEY
        sync: false
      - key: BROWSERBASE_PROJECT_ID
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false

      # Persistent user-modeling backend (Honcho). Optional.
      - key: HONCHO_API_KEY
        sync: false

      # Telegram (most common gateway). The webhook variants are not used
      # here: with TELEGRAM_BOT_TOKEN set and TELEGRAM_WEBHOOK_URL unset,
      # the gateway runs in long-polling mode, which works on Render
      # without any extra port exposure.
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALLOWED_USERS
        sync: false
      - key: TELEGRAM_HOME_CHANNEL
        sync: false

      # Discord.
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_ALLOWED_USERS
        sync: false
      - key: DISCORD_HOME_CHANNEL
        sync: false

      # Slack (Socket Mode: needs both bot token and app-level token).
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: SLACK_ALLOWED_USERS
        sync: false
      - key: SLACK_HOME_CHANNEL
        sync: false
